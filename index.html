<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユタカ</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #e8f7f7;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0, 168, 168, 0.12);
    }

    .avatar {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      margin-bottom: 28px;
      border: 4px solid #2ab8b8;
    }

    .name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    .divider {
      width: 40px;
      height: 3px;
      background-color: #2ab8b8;
      margin: 0 auto 20px;
      border-radius: 2px;
    }

    .bio {
      font-size: 1rem;
      line-height: 1.8;
      color: #5a5a5a;
      letter-spacing: 0.04em;
      margin-bottom: 36px;
    }

    .qr-section {
      border-top: 1px solid #e0f4f4;
      padding-top: 28px;
    }

    .qr-label {
      font-size: 0.75rem;
      color: #2ab8b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .qr-code {
      width: 140px;
      height: 140px;
      object-fit: contain;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 24px;
      }

      .avatar {
        width: 160px;
        height: 160px;
      }

      .name {
        font-size: 1.6rem;
      }

      .qr-code {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="img/IMG_6312.png" alt="ユタカのプロフィール画像">
    <h1 class="name">ユタカ</h1>
    <div class="divider"></div>
    <p class="bio">AI活用が趣味になってしまった老人です</p>
    <div class="qr-section">
      <p class="qr-label">Contact</p>
      <img class="qr-code" src="img/QR_code.png" alt="QRコード">
    </div>
  </div>
</body>
</html>
